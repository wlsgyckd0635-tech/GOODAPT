<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 아이콘 표시를 위한 FontAwesome 추가 -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <title>검색결과 | 아파트 실거래 정보</title>
  </head>
  <body class="bg-gray-50">
    <div class="w-full min-h-screen py-12">
      <div class="max-w-5xl mx-auto px-4">
        <!-- 상단 제목 및 버튼 영역 (정렬 레이아웃 수정) -->
        <div class="w-full text-center mb-8">
          <!-- 1. 제목을 중앙에 시원하게 배치[cite: 4] -->
          <h1 class="text-3xl text-[#293681] font-bold">
            대구광역시 아파트 실거래 정보 데이터 검색 결과
          </h1>

          <!-- 2. 버튼을 테이블 우측 바로 위에 아담한 크기로 배치 -->
          <div class="w-full flex justify-end mt-6">
            <a
              href="/download?DEAL_YMD={{ request.args.get('DEAL_YMD') }}&LAWD_CD={{ request.args.get('LAWD_CD') }}"
              class="inline-flex items-center gap-2 bg-[#4a5568] hover:bg-[#2d3748] text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition-colors cursor-pointer"
            >
              <i class="fa-solid fa-file-csv text-base text-green-400"></i>
              <span>CSV 다운로드</span>
            </a>
          </div>
        </div>

        <!-- 결과 데이터 테이블 영역[cite: 4] -->
        <div
          class="w-full bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200"
        >
          <table class="w-full border-collapse">
            <thead>
              <tr class="bg-gray-100 border-b border-gray-300 text-gray-700">
                <th class="w-40 h-12 border-r border-gray-200 font-semibold">
                  아파트이름
                </th>
                <th class="w-40 border-r border-gray-200 font-semibold">
                  실거래정보(만원)
                </th>
                <th class="w-40 border-r border-gray-200 font-semibold">
                  지역(법정동)
                </th>
                <th class="w-40 border-r border-gray-200 font-semibold">
                  거래일
                </th>
                <th class="font-semibold">전용면적(㎡)</th>
              </tr>
            </thead>
            <tbody>
              {% for result in results %}
              <tr
                class="border-b border-gray-200 hover:bg-gray-50 transition-colors text-center text-gray-800"
              >
                <td class="h-12 px-4 border-r border-gray-200 text-left">
                  {{ result["aptNm"] }}
                </td>
                <td
                  class="h-12 px-4 border-r border-gray-200 text-blue-700 font-bold text-right"
                >
                  {{ result["dealAmount"] }}
                </td>
                <td class="h-12 px-4 border-r border-gray-200">
                  {{ result["umdNm"] }}
                </td>
                <td class="h-12 px-4 border-r border-gray-200">
                  {{ result["dealYear"] }}년 {{ result["dealMonth"] }}월 {{
                  result["dealDay"] }}일
                </td>
                <td class="h-12 px-4 text-right">
                  {{ result["excluUseAr"] }} ㎡
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
