<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>매물 검색 결과 | 대구 부동산 포털</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>
  <body>
    <main class="container">
      <h1>🔍 대구광역시 부동산 '{{ keyword }}' 검색 결과</h1>
      <p>
        총 {{ count }}개의 실시간 아파트 매물 데이터셋 필터링 결과 리스트입니다.
      </p>

      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
        "
      >
        <a href="/download?keyword={{keyword}}">
          <button style="background-color: #28a745; border: none">
            수집된 매물 데이터 CSV 저장
          </button>
        </a>
        <span
          style="
            background-color: #f4f5f6;
            color: #555;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            border: 1px solid #ccc;
          "
        >
          ℹ️ 데이터 출처: 네이버 부동산 및 대구 실거래가 포털
        </span>
      </div>

      <div>
        <table>
          <thead>
            <tr>
              <th style="width: 8%">No</th>
              <th style="width: 35%">아파트 단지명(동)</th>
              <th style="width: 20%">공급/전용 면적</th>
              <th style="width: 22%">소재지</th>
              <th style="width: 15%">매물 호가</th>
            </tr>
          </thead>
          <tbody>
            {% for idx, matzip in matzips %}
            <tr>
              <td>{{ idx + 1 }}</td>
              <td><strong>{{ matzip.name }}</strong></td>
              <td>
                <span
                  style="
                    background-color: #e8f5e9;
                    color: #2e7d32;
                    padding: 2px 6px;
                    border-radius: 4px;
                    font-weight: bold;
                  "
                  >{{ matzip.category }}</span
                >
              </td>
              <td>{{ matzip.address }}</td>
              <td style="color: #d32f2f; font-weight: bold">
                {{ matzip.price }}
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
