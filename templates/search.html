<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>검색 결과 | 맛집 스크래퍼</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>
  <body>
    <main class="container">
      <h1>
        🔥 총 {{ count }}개의 '대구 수성구 {{ keyword }}' 데이터 수집 완료
      </h1>
      <p>
        교육센터(대흥동 알파시티) 및 시지 권역의 다이닝코드 연동 결과
        리스트입니다.
      </p>

      <a href="/download?keyword={{keyword}}">
        <button class="contrast">수집된 데이터 CSV 파일로 저장하기</button>
      </a>

      <div style="margin-top: 30px">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>출처</th>
              <th>식당명</th>
              <th>음식 종류</th>
              <th>주소</th>
            </tr>
          </thead>
          <tbody>
            {% for idx, matzip in matzips %}
            <tr>
              <td>{{ idx + 1 }}</td>
              <td>
                <span
                  style="
                    background-color: #ff5722;
                    color: white;
                    padding: 2px 6px;
                    border-radius: 4px;
                    font-size: 0.8rem;
                    font-weight: bold;
                  "
                >
                  {{ matzip.source }}
                </span>
              </td>
              <td><strong>{{ matzip.name }}</strong></td>
              <td>{{ matzip.category }}</td>
              <td>{{ matzip.address }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
