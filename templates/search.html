<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>검색결과 | 아파트 실거래 정보</title>
  </head>
  <body>
    <div class="w-full h-40">
      <div class="w-5xl h-full mx-auto">
        <h1
          class="text-3xl h-full text-[#293681] font-bold flex justify-center items-center"
        >
          대구광역시 아파트 실거래 정보 데이터 검색 결과
        </h1>
        <table class="w-full border-collapse border border-gray-300">
          <thead>
            <tr class="bg-gray-100 border-b border-gray-300">
              <th class="w-40 h-12 border-r border-gray-300">아파트이름</th>
              <th class="w-40 border-r border-gray-300">실거래정보(만원)</th>
              <th class="w-40 border-r border-gray-300">지역(법정동)</th>
              <th class="w-40 border-r border-gray-300">거래일</th>
              <th class="w-40">전용면적(㎡)</th>
            </tr>
          </thead>
          <tbody>
            {% for result in results %}
            <tr class="border-b border-gray-200 hover:bg-gray-50">
              <td class="h-12 px-4 border-r border-gray-200">
                {{ result["aptNm"] }}
              </td>
              <td
                class="h-12 px-4 border-r border-gray-200 text-blue-700 font-bold"
              >
                {{ result["dealAmount"] }}
              </td>
              <td class="h-12 px-4 border-r border-gray-200">
                {{ result["umdNm"] }}
              </td>
              <td class="h-12 px-4 border-r border-gray-200">
                {{ result["dealYear"] }}년 {{ result["dealMonth"] }}월 {{
                result["dealDay"] }}일
              </td>
              <td class="h-12 px-4">{{ result["excluUseAr"] }} ㎡</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
