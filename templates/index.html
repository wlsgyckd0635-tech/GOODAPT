<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대구광역시 부동산 실시간 매물 포털</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <style>
      body {
        background-color: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .search-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 650px;
        width: 100%;
        text-align: center;
      }
      .main-title {
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 10px;
        color: #111b27;
        white-space: nowrap;
      }
      .sub-title {
        color: #6c757d;
        font-size: 0.95rem;
        margin-bottom: 30px;
      }
      button {
        background-color: #28a745;
        border: none;
      } /* 부동산 느낌의 초록 버튼 */
      button:hover {
        background-color: #218838;
      }
    </style>
  </head>
  <body>
    <main class="search-card">
      <h2 class="main-title">🏢 대구광역시 부동산 실시간 매물 포털</h2>
      <p class="sub-title">
        대구 전역의 네이버 부동산 연동 매물 300개 이상을 조회합니다.
      </p>
      <form action="/search" method="get">
        <input
          type="text"
          name="keyword"
          placeholder="검색어를 입력하세요 (예: 수성구, 84㎡, 푸르지오, 아파트명)"
          required
        />
        <button type="submit">실시간 매물 데이터 조회</button>
      </form>
    </main>
  </body>
</html>
