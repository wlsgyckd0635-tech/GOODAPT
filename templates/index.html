<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대구광역시 맛집 빅데이터 포털</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <style>
      /* 화면 중앙 정렬 및 배경 스타일 */
      body {
        background-color: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .search-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 650px;
        width: 100%;
        text-align: center;
      }
      /* 💡 폰트 크기를 줄이고 반응형 스타일을 적용해 무조건 1줄로 나오도록 설정 */
      .main-title {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 10px;
        color: #111b27;
      }
      .sub-title {
        color: #6c757d;
        font-size: 0.95rem;
        margin-bottom: 30px;
      }
      input[type="text"] {
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 0.95rem;
        border: 1px solid #ced4da;
      }
      button {
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        background-color: #007bff;
        border: none;
        padding: 12px;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <main class="search-card">
      <h2 class="main-title">📍 대구광역시 맛집 데이터포털</h2>
      <p class="sub-title">대구의 실존 상권 데이터 300개 이상을 조회합니다.</p>

      <form action="/search" method="get" style="margin: 0">
        <input
          type="text"
          name="keyword"
          placeholder="검색어를 입력하세요 (예: 중식, 한식, 고기구이, 카페)"
          required
        />
        <button type="submit">실시간 데이터 필터링 및 검색</button>
      </form>
    </main>
  </body>
</html>
